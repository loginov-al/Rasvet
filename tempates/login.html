<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rassvet - Вход</title>
    <link rel="icon" href="/static/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1e1e1e;
            --card: #292929;
            --soft: #202020;
            --line: #3a3a3a;
            --text: #f4f4f4;
            --muted: #9b9b9b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: "Montserrat", sans-serif;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .login {
            width: min(100%, 420px);
            background: var(--card);
            border: 1px solid #333;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 22px 60px rgba(0, 0, 0, .32);
        }

        .brand {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: #222;
            border: 1px solid var(--line);
            display: grid;
            place-items: center;
            font-size: 24px;
            margin-bottom: 18px;
        }

        h1 { font-size: 26px; line-height: 1.15; margin-bottom: 8px; letter-spacing: -.04em; }
        p { color: var(--muted); font-size: 14px; line-height: 1.55; margin-bottom: 22px; }
        form { display: grid; gap: 14px; }

        label {
            display: grid;
            gap: 8px;
            color: #cfcfcf;
            font-size: 13px;
            font-weight: 700;
        }

        input {
            width: 100%;
            height: 48px;
            background: var(--soft);
            border: 1px solid var(--line);
            border-radius: 14px;
            color: var(--text);
            outline: 0;
            padding: 0 15px;
            font: inherit;
            transition: .2s;
        }

        input:focus {
            border-color: #626262;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, .035);
        }

        .error {
            background: rgba(255, 80, 80, .09);
            border: 1px solid rgba(255, 80, 80, .22);
            color: #ffb0b0;
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 13px;
            line-height: 1.45;
        }

        button {
            height: 50px;
            border: 0;
            border-radius: 999px;
            background: #fff;
            color: #111;
            cursor: pointer;
            font: inherit;
            font-weight: 800;
            margin-top: 4px;
            transition: .2s;
        }

        button:hover { transform: translateY(-1px); }
        .link { text-align: center; margin-top: 18px; margin-bottom: 0; }
        .link a { color: #fff; font-weight: 700; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <main class="login">
        <div class="brand">☀</div>
        <h1>Вход в Rassvet</h1>
        <p>Добро пожаловать! Авторизируйтесь в аккаунт Russvet.</p>

        <form method="post" action="/login">
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <label>
                Почта
                <input name="email" type="email" placeholder="Введите вашу почту" autocomplete="email" required>
            </label>

            <label>
                Пароль
                <input name="password" type="password" placeholder="Введите пароль" autocomplete="current-password" required>
            </label>

            <button type="submit">Войти</button>
        </form>

        <p class="link">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
    </main>
</body>
</html>
